<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

  .sim-wrap { width: 100%; border: 1px solid #0a0a0a; }

  .readouts {
    display: flex;
    background: #0a0a0a;
    border-bottom: 1px solid #0a0a0a;
  }
  .readout { flex: 1; padding: 10px 14px; border-right: 1px solid #2a2a28; }
  .readout:last-child { border-right: none; }
  .readout-key { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: #6b6a67; margin-bottom: 3px; }
  .readout-val { font-size: 13px; color: #f5f4f0; }

  canvas { display: block; width: 100%; background: #0a0a0a; cursor: crosshair; touch-action: none; }

  .controls {
    border-top: 1px solid #0a0a0a;
    padding: 14px 18px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: center;
    background: #f5f4f0;
  }
  .control-row { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 140px; }
  .control-row label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #6b6a67; white-space: nowrap; min-width: 56px; }

  input[type="range"] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 1px; background: #c4c3bf; outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 11px; height: 11px; background: #0a0a0a; border-radius: 50%; cursor: pointer; }
  input[type="range"]::-moz-range-thumb { width: 11px; height: 11px; background: #0a0a0a; border: none; border-radius: 50%; cursor: pointer; }

  .val { font-size: 11px; min-width: 26px; text-align: right; color: #0a0a0a; }

  .reset-btn {
    font-family: inherit; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    background: none; border: 1px solid #0a0a0a; padding: 6px 12px;
    cursor: pointer; color: #0a0a0a; transition: background 0.15s, color 0.15s;
  }
  .reset-btn:hover { background: #0a0a0a; color: #f5f4f0; }


</style>
</head>
<body>
<div class="sim-wrap">
  <div class="readouts">
    <div class="readout"><div class="readout-key">area strain</div><div class="readout-val" id="strainOut">0.0%</div></div>
    <div class="readout"><div class="readout-key">max stretch</div><div class="readout-val" id="stretchOut">1.00×</div></div>
    <div class="readout"><div class="readout-key">pressure</div><div class="readout-val" id="pressOut">30</div></div>
    <div class="readout"><div class="readout-key">nodes</div><div class="readout-val">48</div></div>
  </div>
  <canvas id="c"></canvas>
  <div class="controls">
    <div class="control-row">
      <label>pressure</label>
      <input type="range" id="pSlider" min="0" max="100" value="30" step="1" />
      <span class="val" id="pVal">30</span>
    </div>
    <div class="control-row">
      <label>stiffness</label>
      <input type="range" id="sSlider" min="1" max="100" value="40" step="1" />
      <span class="val" id="sVal">40</span>
    </div>
    <button class="reset-btn" id="resetBtn">reset</button>
  </div>

</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const N = 48, DT = 1/60, DAMPING = 0.978;
let W, H, cx, cy, R0, nodes = [], restLengths = [], naturalLengths = [];
let pressure = 30, stiffness = 40;
let mouse = { x: null, y: null, down: false, radius: 0 };
let animId;

function resize() {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  W = rect.width;
  H = Math.round(Math.min(W * 0.62, 420));
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  cx = W/2; cy = H/2;
  R0 = Math.min(W, H) * 0.30;
  mouse.radius = Math.min(W, H) * 0.08;
  init();
}

function init() {
  nodes = [];
  for (let i = 0; i < N; i++) {
    const a = (i/N) * Math.PI * 2;
    nodes.push({ x: cx + Math.cos(a)*R0, y: cy + Math.sin(a)*R0, vx: 0, vy: 0 });
  }
  restLengths = []; naturalLengths = [];
  for (let i = 0; i < N; i++) {
    const j = (i+1)%N;
    const dx = nodes[j].x - nodes[i].x, dy = nodes[j].y - nodes[i].y;
    const L = Math.sqrt(dx*dx + dy*dy);
    restLengths.push(L); naturalLengths.push(L);
  }
}

function signedArea() {
  let a = 0;
  for (let i = 0; i < N; i++) { const j=(i+1)%N; a += nodes[i].x*nodes[j].y - nodes[j].x*nodes[i].y; }
  return a/2;
}

function step() {
  const k = stiffness * 0.9, p = pressure * 0.0014;
  const area = Math.abs(signedArea());
  const restArea = Math.PI * R0 * R0;
  const areaRatio = restArea / (area + 1);
  const fx = new Float64Array(N), fy = new Float64Array(N);
  let maxStretch = 1;
  for (let i = 0; i < N; i++) {
    const j = (i+1)%N;
    const dx = nodes[j].x - nodes[i].x, dy = nodes[j].y - nodes[i].y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 0.001;
    const sr = dist / naturalLengths[i];
    if (sr > maxStretch) maxStretch = sr;
    const stretchRatio = (dist - restLengths[i]) / restLengths[i];
    const nlK = k * (1 + 2.5 * Math.max(0, stretchRatio) ** 2);
    const f = nlK * stretchRatio;
    const ffx = f*dx/dist, ffy = f*dy/dist;
    fx[i] += ffx; fy[i] += ffy; fx[j] -= ffx; fy[j] -= ffy;
    const nx = -dy/dist, ny = dx/dist;
    const pf = p * restLengths[i] * areaRatio;
    fx[i] += nx*pf*0.5; fy[i] += ny*pf*0.5;
    fx[j] += nx*pf*0.5; fy[j] += ny*pf*0.5;
  }
  if (mouse.down && mouse.x !== null) {
    for (let i = 0; i < N; i++) {
      const dx = nodes[i].x - mouse.x, dy = nodes[i].y - mouse.y;
      const d2 = dx*dx + dy*dy, r2 = mouse.radius**2;
      if (d2 < r2) { const d = Math.sqrt(d2)||0.001; const push=(1-d/mouse.radius)*20; nodes[i].vx+=(dx/d)*push; nodes[i].vy+=(dy/d)*push; }
    }
  }
  for (let i = 0; i < N; i++) {
    nodes[i].vx = (nodes[i].vx + fx[i]*DT)*DAMPING;
    nodes[i].vy = (nodes[i].vy + fy[i]*DT)*DAMPING;
    nodes[i].x += nodes[i].vx; nodes[i].y += nodes[i].vy;
  }
  return { area, restArea, maxStretch };
}

function draw(stats) {
  ctx.clearRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  if (mouse.down && mouse.x !== null) {
    ctx.beginPath(); ctx.arc(mouse.x, mouse.y, mouse.radius, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1; ctx.stroke();
  }
  const stretchRatios = [];
  for (let i = 0; i < N; i++) {
    const j=(i+1)%N, dx=nodes[j].x-nodes[i].x, dy=nodes[j].y-nodes[i].y;
    stretchRatios.push(Math.sqrt(dx*dx+dy*dy)/naturalLengths[i]);
  }
  ctx.beginPath(); ctx.moveTo(nodes[0].x, nodes[0].y);
  for (let i = 1; i < N; i++) ctx.lineTo(nodes[i].x, nodes[i].y);
  ctx.closePath(); ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fill();
  for (let i = 0; i < N; i++) {
    const j=(i+1)%N, t=Math.max(0, Math.min((stretchRatios[i]-1)/1, 1));
    ctx.beginPath(); ctx.moveTo(nodes[i].x, nodes[i].y); ctx.lineTo(nodes[j].x, nodes[j].y);
    ctx.strokeStyle = `rgba(255,255,255,${(0.3+t*0.6).toFixed(2)})`; ctx.lineWidth = 1+t*2; ctx.stroke();
  }
  for (let i = 0; i < N; i++) {
    const t=Math.min(Math.max(stretchRatios[i]-1,0)/1,1);
    ctx.beginPath(); ctx.arc(nodes[i].x, nodes[i].y, 2+t*1.5, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${(0.2+t*0.6).toFixed(2)})`; ctx.fill();
  }
  if (stats) {
    const strain = Math.max(0, ((stats.area/stats.restArea)-1)*100);
    document.getElementById('strainOut').textContent = strain.toFixed(1)+'%';
    document.getElementById('stretchOut').textContent = stats.maxStretch.toFixed(2)+'×';
    document.getElementById('pressOut').textContent = pressure;
  }
}

function loop() { let s; for(let i=0;i<3;i++) s=step(); draw(s); animId=requestAnimationFrame(loop); }

function getPos(e) { const r=canvas.getBoundingClientRect(), src=e.touches?e.touches[0]:e; return {x:src.clientX-r.left,y:src.clientY-r.top}; }
canvas.addEventListener('mousedown', e=>{const p=getPos(e);mouse.x=p.x;mouse.y=p.y;mouse.down=true;});
canvas.addEventListener('mousemove', e=>{if(mouse.down){const p=getPos(e);mouse.x=p.x;mouse.y=p.y;}});
canvas.addEventListener('mouseup', ()=>mouse.down=false);
canvas.addEventListener('mouseleave', ()=>mouse.down=false);
canvas.addEventListener('touchstart', e=>{e.preventDefault();const p=getPos(e);mouse.x=p.x;mouse.y=p.y;mouse.down=true;},{passive:false});
canvas.addEventListener('touchmove', e=>{e.preventDefault();const p=getPos(e);mouse.x=p.x;mouse.y=p.y;},{passive:false});
canvas.addEventListener('touchend', ()=>mouse.down=false);
canvas.addEventListener('wheel', e=>{e.preventDefault();pressure=Math.max(0,Math.min(100,pressure-Math.sign(e.deltaY)*3));document.getElementById('pSlider').value=pressure;document.getElementById('pVal').textContent=pressure;},{passive:false});
document.getElementById('pSlider').addEventListener('input', function(){pressure=+this.value;document.getElementById('pVal').textContent=pressure;});
document.getElementById('sSlider').addEventListener('input', function(){stiffness=+this.value;document.getElementById('sVal').textContent=stiffness;});
document.getElementById('resetBtn').addEventListener('click', ()=>init());
window.addEventListener('resize', ()=>{cancelAnimationFrame(animId);resize();loop();});
resize(); loop();
</script>
</body>
</html>
